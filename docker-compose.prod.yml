version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-marketplace-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/legal_marketplace
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - legal-network
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7.0
    container_name: legal-marketplace-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=legal_marketplace
    volumes:
      - mongo-data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: unless-stopped
    networks:
      - legal-network
    command: mongod

  redis:
    image: redis:7-alpine
    container_name: legal-marketplace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - legal-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  nginx:
    image: nginx:alpine
    container_name: legal-marketplace-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - legal-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-marketplace-worker
    command: npm run worker
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/legal_marketplace
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - legal-network

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  legal-network:
    driver: bridge